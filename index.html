<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>근무기록 수정 요청 — 인터랙티브 스펙</title>
<link href="//spoqa.github.io/spoqa-han-sans/css/SpoqaHanSansNeo.css" rel="stylesheet" type="text/css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}
:root{--f:'Spoqa Han Sans Neo','Apple SD Gothic Neo','Noto Sans KR',sans-serif;--primary:#6267E9}
html,body{background:#EEF1F4;min-height:100vh}
.page{display:flex;flex-direction:row;align-items:flex-start;justify-content:center;gap:24px;padding:2rem 8px;font-family:var(--f)}
.opts{display:flex;flex-direction:column;gap:20px;background:#fff;border:1px solid #E1E6EA;border-radius:16px;padding:18px 16px;box-shadow:0 2px 10px rgba(0,0,0,.05);align-self:flex-start;position:sticky;top:16px}
.opt{display:flex;align-items:center;justify-content:space-between;gap:18px}
.opt-t{font-size:13px;font-weight:700;color:#202528;white-space:nowrap}
.sw{width:46px;height:28px;border-radius:14px;background:#E1E6EA;position:relative;transition:background .2s;cursor:pointer;flex:none}
.sw.on{background:var(--primary)}
.sw i{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:transform .22s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.sw.on i{transform:translateX(18px)}
.iphone{background:linear-gradient(145deg,#3E3E40 0%,#1C1C1E 50%,#2E2E30 100%);border-radius:52px;padding:14px 12px 22px;position:relative;box-shadow:inset 0 0 0 1px rgba(255,255,255,0.13),inset 0 0 0 2px rgba(0,0,0,0.6),0 28px 56px rgba(0,0,0,0.6);transition:padding .25s;flex:none}
.iphone.small{border-radius:44px;padding:11px 10px 18px}
.screen{background:#9aa;border-radius:40px;overflow:hidden;width:320px;height:692px;position:relative;transition:width .25s,height .25s}
.iphone.small .screen{border-radius:34px}
.screen.small{width:300px;height:533px}
.di{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:112px;height:34px;background:#000;border-radius:20px;z-index:30}
.statusbar{position:absolute;top:0;left:0;right:0;height:50px;z-index:25;display:flex;justify-content:space-between;align-items:flex-end;padding:0 26px 8px;pointer-events:none}
.sb-time{color:#fff;font-size:13px;font-weight:700;letter-spacing:-.2px}
.sb-icons{display:flex;gap:5px;align-items:center}
.bgapp{position:absolute;inset:0;background:linear-gradient(#cfd6dc,#dfe4e9)}
.design{position:absolute;top:0;left:0;width:402px;height:869px;zoom:0.796;transform-origin:top left}
.screen.small .design{zoom:0.746;height:715px}
.dim{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;background:rgba(0,0,0,0.5)}
.bs{display:flex;flex-direction:column;align-items:stretch;width:402px;height:90%;background:#FFFFFF;border-radius:20px 20px 0 0;overflow:hidden}
.handle{display:flex;justify-content:center;align-items:center;padding:8px 10px;height:20px;flex:none}
.hbar{width:52px;height:4px;background:#E1E6EA;border-radius:20px}
.stitle{display:flex;align-items:center;padding:12px 16px;gap:8px;height:54px;flex:none}
.stitle-text{font-weight:700;font-size:18px;line-height:26px;color:#202528;flex:1}
.del-btn{display:inline-flex;justify-content:center;align-items:center;padding:4px 8px;height:30px;background:#FFF3EE;border-radius:8px;cursor:pointer;flex-shrink:0}
.del-btn-text{font-weight:700;font-size:14px;line-height:22px;color:#FF404D;white-space:nowrap}
.body{display:flex;flex-direction:column;align-items:stretch;padding:16px;gap:20px;flex:1 1 auto;min-height:0;overflow-y:auto;scroll-behavior:smooth}
.info{display:flex;flex-direction:column;padding:12px;gap:4px;background:#F3F5F7;border:1px solid #E1E6EA;border-radius:16px;flex:none}
.info-list{display:flex;gap:12px;height:24px}
.info-label{font-weight:700;font-size:15px;line-height:24px;color:#202528}
.info-date{font-weight:400;font-size:15px;line-height:24px;color:#465159}
.maincontents{display:flex;flex-direction:column;gap:32px}
.memo-wrap{display:flex;flex-direction:column;gap:4px}
.memo-label{font-weight:700;font-size:14px;line-height:22px;color:#202528}
.memo-row{display:flex;align-items:flex-start;gap:8px;height:48px}
.memo-input{display:flex;align-items:center;padding:12px;gap:8px;flex:1;height:48px;background:#F3F5F7;border:1px solid #E1E6EA;border-radius:12px;cursor:text}
.memo-input.focused{border-color:var(--primary);background:#fff}
.memo-field{flex:1;min-width:0;appearance:none;-webkit-appearance:none;border:none !important;outline:none !important;background:transparent !important;box-shadow:none !important;border-radius:0 !important;padding:0 !important;margin:0 !important;height:24px;font-family:var(--f);font-weight:400;font-size:16px;line-height:24px;color:#202528}
.memo-field::placeholder{color:#848D95;opacity:1}
.send-btn{display:flex;justify-content:center;align-items:center;width:48px;height:48px;flex-shrink:0;background:#E1E6EA;border-radius:12px;cursor:default;transition:background .15s}
.send-btn.active{background:var(--primary);cursor:pointer}
.memo-done{display:none;align-items:flex-start;gap:8px}
.memo-done.show{display:flex}
.md-date{font-weight:400;font-size:14px;line-height:22px;color:#848D95;white-space:nowrap;flex:none}
.md-text{flex:1;font-weight:400;font-size:16px;line-height:24px;color:#202528;word-break:break-all}
.md-btns{display:flex;gap:4px;flex:none}
.sbtn{display:inline-flex;justify-content:center;align-items:center;padding:4px 8px;height:30px;border-radius:8px;cursor:pointer;font-weight:700;font-size:14px;line-height:22px;white-space:nowrap}
.sbtn.red{background:#FFF3EE;color:#FF404D}
.sbtn.gray{background:#F3F5F7;color:#465159}
.timearea{display:flex;align-items:flex-start;gap:12px}
.tcol{display:flex;flex-direction:column;gap:12px;flex:1}
.tcard{display:flex;flex-direction:column;border:1px solid #E1E6EA;border-radius:16px;overflow:hidden}
.tcard.edit{cursor:pointer;transition:border-color .15s,box-shadow .15s}
.tcard.selected{border-color:var(--primary);box-shadow:inset 0 0 0 1px var(--primary)}
.tc-head{display:flex;align-items:center;padding:4px 12px;gap:4px;height:32px}
.tc-lbl{font-weight:700;font-size:16px;line-height:24px;color:#202528}
.tc-body{display:flex;align-items:center;padding:16px;gap:8px;height:61px}
.tc-val{font-weight:400;font-size:20px;line-height:29px;color:#202528}
.tc-val.miss{color:#FF404D}
.gps-btn{display:none;width:24px;height:24px;border-radius:8px;background:#F3F5F7;align-items:center;justify-content:center;flex:none}
.dim.show-gps .gps-btn{display:flex}
.nextday{display:none;font-weight:400;font-size:15px;line-height:24px;color:#848D95;flex:none}
.dim.show-next .nextday{display:inline-block}
.timepicker{flex:none;height:0;overflow:hidden;transition:height .28s ease}
.timepicker.open{height:200px;border-top:1px solid #EFF1F4}
.tp-inner{position:relative;height:200px;display:flex;justify-content:center;align-items:stretch;padding:0 20px}
.tp-band{position:absolute;left:16px;right:16px;top:80px;height:40px;background:#EEF0F6;border-radius:10px;z-index:1}
.wheel{position:relative;height:200px;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;text-align:center;z-index:2;-webkit-overflow-scrolling:touch}
.wheel::-webkit-scrollbar{display:none}
.wheel .pad{height:80px}
.wheel .it{height:40px;line-height:40px;scroll-snap-align:center;font-size:21px;font-weight:400;color:#AEB6BE;transition:color .12s;white-space:nowrap}
.wheel .it.on{color:#202528}
.w-ampm{width:78px}
.w-num{width:54px}
.tp-colon{display:flex;align-items:center;justify-content:center;width:10px;font-size:21px;color:#202528;height:200px;z-index:2}
.cta{display:flex;align-items:flex-start;padding:12px 16px;gap:12px;height:82px;background:#fff;flex:none}
.cta-cancel{display:flex;justify-content:center;align-items:center;padding:16px 12px;flex:1;height:58px;background:#F3F5F7;border-radius:12px;cursor:pointer}
.cta-cancel span{font-weight:700;font-size:18px;line-height:26px;color:#465159}
.cta-submit{display:flex;justify-content:center;align-items:center;padding:16px 12px;flex:1;height:58px;background:#E1E6EA;border-radius:12px;cursor:default;transition:background .15s}
.cta-submit.active{background:var(--primary);cursor:pointer}
.cta-submit span{font-weight:700;font-size:18px;line-height:26px;color:#FFFFFF}
.kb{position:absolute;left:0;bottom:0;width:402px;z-index:60;background:#D1D4DB;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);font-family:-apple-system,'SF Pro Text','Helvetica Neue',var(--f);padding-bottom:2px}
.kb.show{transform:translateY(0)}
.kb-acc{height:44px;display:flex;align-items:center}
.kb-sug{flex:1;display:flex;align-items:center;justify-content:center;height:38px;font-size:16px;color:#000;position:relative}
.kb-sug.q{font-weight:600}
.kb-sug+.kb-sug::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:1px;background:#AEB2BA}
.kb-keys{display:flex;flex-direction:column;gap:11px;padding:8px 3px 0}
.kb-row{display:flex;justify-content:center;gap:6px}
.key{height:43px;min-width:31px;flex:1 1 0;background:#fff;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:400;color:#000;box-shadow:0 1px 0 rgba(0,0,0,.3);cursor:pointer;user-select:none}
.key:active{background:#BBC0C9}
.key.fn{background:#ABB1BC;font-size:16px}
.key.wide{flex:1.4 1 0}
.key.space{flex:5 1 0;font-size:16px}
.key.ret{flex:2.4 1 0;font-size:16px}
.kb-r2{padding:0 18px}
.kb-home{height:24px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px}
.kb-home i{width:140px;height:5px;background:#000;border-radius:100px;display:block}
.confirm{position:absolute;inset:0;z-index:90;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.5);padding:0 16px}
.confirm.show{display:flex}
.cf-card{width:338px;background:#fff;border:1px solid #F3F5F7;border-radius:20px;overflow:hidden;font-family:var(--f)}
.cf-body{display:flex;flex-direction:column;align-items:center;padding:20px;gap:12px;text-align:center}
.cf-title{font-size:16px;font-weight:700;line-height:24px;color:#202528}
.cf-msg{font-size:14px;font-weight:400;line-height:22px;color:#202528}
.cf-btns{display:flex;height:48px;border-top:1px solid #F3F5F7}
.cf-btn{flex:1;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;line-height:24px;cursor:pointer}
.cf-btn.cancel{color:#848D95;border-right:1px solid #F3F5F7}
.cf-btn.del{color:var(--primary)}
</style>
</head>

                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><mask id="mh" style="mask-type:alpha" maskUnits="userSpaceOnUse" x="1" y="1" width="18" height="18"><rect x="1.667" y="1.668" width="16.667" height="16.667" fill="#D9D9D9"/></mask><g mask="url(#mh)"><path d="M3.421 8.41283C3.421 6.95945 4.599 5.78125 6.052 5.78125H13.947C15.401 5.78125 16.579 6.95945 16.579 8.41283V14.5532C16.579 16.0066 15.401 17.1848 13.947 17.1848H6.052C4.599 17.1848 3.421 16.0066 3.421 14.5532V8.41283Z" fill="#D1ECFF"/><path d="M7.807 14.553C7.807 14.0685 8.199 13.6758 8.684 13.6758H11.315C11.8 13.6758 12.193 14.0685 12.193 14.553V17.1846H7.807V14.553Z" fill="#465159"/><path d="M1.667 7.62779C1.667 7.03128 1.997 6.48387 2.525 6.20605L9.183 2.7019C9.695 2.4327 10.306 2.4327 10.817 2.7019L17.475 6.20605C18.003 6.48387 18.334 7.03128 18.334 7.62779C18.334 8.80724 17.105 9.58466 16.039 9.07976L10.751 6.57496C10.276 6.34979 9.725 6.34979 9.249 6.57496L3.961 9.07976C2.896 9.58466 1.667 8.80724 1.667 7.62779Z" fill="#75BCFF"/></g></svg>
                        <span class="tc-lbl">퇴근</span>
                      </div>
                      <div class="tc-body">
                        <span class="gps-btn"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><mask id="mgps2" style="mask-type:alpha" maskUnits="userSpaceOnUse" x="1" y="1" width="14" height="14"><rect x="1.333" y="1.332" width="13.333" height="13.333" fill="#D9D9D9"/></mask><g mask="url(#mgps2)"><path d="M8 1.33203C10.7613 1.33203 12.9997 3.58998 13 6.375C13 8.68108 10.429 12.3544 8.83496 14.2656L8.74805 14.3594C8.29439 14.7965 7.58169 14.7652 7.16504 14.2656C5.57104 12.3544 3 8.68108 3 6.375C3.00025 3.58998 5.23873 1.33203 8 1.33203ZM8 4.66602C7.07963 4.66602 6.33318 5.41171 6.33301 6.33203C6.33301 7.25251 7.07953 7.99902 8 7.99902C8.92047 7.99902 9.66699 7.25251 9.66699 6.33203C9.66682 5.41171 8.92037 4.66602 8 4.66602Z" fill="#848D95"/></g></svg></span>
                        <span class="nextday">익일</span>
                        <span class="tc-val" id="rtGohome">18:00</span>
                      </div>
                    </div>
                  </div>
                  <div class="tcol">
                    <div class="tcard edit" id="cardGowork" data-kind="gowork" data-def="09:00">
                      <div class="tc-head"><span class="tc-lbl">수정 요청</span></div>
                      <div class="tc-body"><span class="tc-val" data-slot></span></div>
                    </div>
                    <div class="tcard edit" id="cardGohome" data-kind="gohome" data-def="18:00">
                      <div class="tc-head"><span class="tc-lbl">수정 요청</span></div>
                      <div class="tc-body"><span class="tc-val" data-slot></span></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div class="timepicker" id="timepicker">
              <div class="tp-inner">
                <div class="tp-band"></div>
                <div class="wheel w-ampm" id="wAmpm"></div>
                <div class="wheel w-num" id="wHour"></div>
                <div class="tp-colon">:</div>
                <div class="wheel w-num" id="wMin"></div>
              </div>
            </div>
            <div class="cta">
              <div class="cta-cancel" id="btnCancel"><span>취소</span></div>
              <div class="cta-submit" id="btnSubmit"><span>수정 요청</span></div>
            </div>
          </div>
          <div class="kb" id="kb">
            <div class="kb-acc">
              <div class="kb-sug">“야근”</div>
              <div class="kb-sug q">야근했음</div>
              <div class="kb-sug">야근</div>
            </div>
            <div class="kb-keys" id="kbKeys"></div>
            <div class="kb-home"><i></i></div>
          </div>
          <div class="confirm" id="confirm">
            <div class="cf-card">
              <div class="cf-body">
                <div class="cf-title">근무기록 메모를 삭제하시겠습니까?</div>
                <div class="cf-msg">삭제 후에도 내 메모에서 작성이력을 확인할 수 있습니다.</div>
              </div>
              <div class="cf-btns">
                <div class="cf-btn cancel" id="cfCancel">취소</div>
                <div class="cf-btn del" id="cfDel">삭제</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  var ITEM=40,ampm=['오전','오후'],hours=[],mins=[];
  for(var h=1;h<=12;h++)hours.push(String(h));
  for(var m=0;m<60;m++)mins.push(('0'+m).slice(-2));
  function fill(el,arr){var s='<div class="pad"></div>';for(var i=0;i<arr.length;i++)s+='<div class="it">'+arr[i]+'</div>';s+='<div class="pad"></div>';el.innerHTML=s;}
  var wA=document.getElementById('wAmpm'),wH=document.getElementById('wHour'),wM=document.getElementById('wMin');
  fill(wA,ampm);fill(wH,hours);fill(wM,mins);
  function its(el){return el.querySelectorAll('.it');}
  function idxOf(el){return Math.round(el.scrollTop/ITEM);}
  function mark(el){var i=idxOf(el),a=its(el);for(var k=0;k<a.length;k++)a[k].classList.toggle('on',k===i);}
  function setIdx(el,i){el.scrollTop=i*ITEM;mark(el);}
  function valOf(el,arr){return arr[Math.max(0,Math.min(arr.length-1,idxOf(el)))];}
  var state={selected:null};
  function to24(){var ap=valOf(wA,ampm),hh=parseInt(valOf(wH,hours),10),mm=valOf(wM,mins);if(ap==='오전'){if(hh===12)hh=0;}else{if(hh!==12)hh+=12;}return ('0'+hh).slice(-2)+':'+mm;}
  function from24(t){var p=t.split(':'),H=parseInt(p[0],10),M=p[1];var ap=H<12?'오전':'오후';var h12=H%12;if(h12===0)h12=12;return{ap:ap,h:String(h12),m:M};}
  function applyPicked(){if(!state.selected)return;document.getElementById(state.selected==='gowork'?'cardGowork':'cardGohome').querySelector('[data-slot]').textContent=to24();document.getElementById('btnSubmit').classList.add('active');}
  [[wA,ampm],[wH,hours],[wM,mins]].forEach(function(w){var t;w[0].addEventListener('scroll',function(){mark(w[0]);clearTimeout(t);t=setTimeout(applyPicked,100);});});

  var kb=document.getElementById('kb'),keys=document.getElementById('kbKeys');
  var rows=[['q','w','e','r','t','y','u','i','o','p'],['a','s','d','f','g','h','j','k','l'],['z','x','c','v','b','n','m']];
  function K(label,cls){return '<div class="key '+(cls||'')+'">'+label+'</div>';}
  var html='<div class="kb-row">';rows[0].forEach(function(c){html+=K(c);});html+='</div>';
  html+='<div class="kb-row kb-r2">';rows[1].forEach(function(c){html+=K(c);});html+='</div>';
  html+='<div class="kb-row">'+K('⇧','fn wide kb-shift');rows[2].forEach(function(c){html+=K(c);});html+=K('⌫','fn wide kb-del')+'</div>';
  html+='<div class="kb-row">'+K('123','fn wide')+K('🌐','fn')+K('space','space kb-space')+K('return','fn ret kb-ret')+'</div>';
  keys.innerHTML=html;
  var field=document.getElementById('memoField');
  function showKb(){kb.classList.add('show');}
  function hideKb(){kb.classList.remove('show');}
  keys.addEventListener('mousedown',function(e){if(e.target.closest('.key'))e.preventDefault();});
  keys.addEventListener('click',function(e){
    var key=e.target.closest('.key');if(!key)return;
    if(key.classList.contains('kb-del'))field.value=field.value.slice(0,-1);
    else if(key.classList.contains('kb-ret')){hideKb();field.blur();return;}
    else if(key.classList.contains('kb-shift')||key.textContent==='123'||key.textContent==='🌐'){}
    else if(key.classList.contains('kb-space')){if(field.value.length<40)field.value+=' ';}
    else{if(field.value.length<40)field.value+=key.textContent;}
    field.dispatchEvent(new Event('input'));
  });

  var send=document.getElementById('sendBtn'),row=document.getElementById('memoRow'),done=document.getElementById('memoDone'),mdText=document.getElementById('mdText'),box=document.getElementById('memoBox');
  field.addEventListener('input',function(){send.classList.toggle('active',field.value.trim().length>0);});
  field.addEventListener('focus',function(){box.classList.add('focused');showKb();});
  field.addEventListener('blur',function(){box.classList.remove('focused');});
  send.addEventListener('click',function(){if(!send.classList.contains('active'))return;mdText.textContent=field.value.trim();row.style.display='none';done.classList.add('show');hideKb();});
  document.getElementById('mdEdit').addEventListener('click',function(){done.classList.remove('show');row.style.display='flex';field.value=mdText.textContent;send.classList.add('active');field.focus();});

  var confirmEl=document.getElementById('confirm');
  function doDelete(){done.classList.remove('show');row.style.display='flex';field.value='';mdText.textContent='';send.classList.remove('active');}
  document.getElementById('mdDel').addEventListener('click',function(){confirmEl.classList.add('show');});
  document.getElementById('cfCancel').addEventListener('click',function(){confirmEl.classList.remove('show');});
  document.getElementById('cfDel').addEventListener('click',function(){confirmEl.classList.remove('show');doDelete();});

  var bodyScroll=document.getElementById('bodyScroll');
  function selectCard(kind){
    hideKb();field.blur();
    state.selected=kind;
    document.getElementById('cardGowork').classList.toggle('selected',kind==='gowork');
    document.getElementById('cardGohome').classList.toggle('selected',kind==='gohome');
    document.getElementById('timepicker').classList.add('open');
    var card=document.getElementById(kind==='gowork'?'cardGowork':'cardGohome');
    var base=card.querySelector('[data-slot]').textContent.trim()||card.getAttribute('data-def');
    var v=from24(base);
    requestAnimationFrame(function(){requestAnimationFrame(function(){
      setIdx(wA,Math.max(0,ampm.indexOf(v.ap)));setIdx(wH,Math.max(0,hours.indexOf(v.h)));setIdx(wM,Math.max(0,mins.indexOf(v.m)));
    });});
    setTimeout(function(){bodyScroll.scrollTop=bodyScroll.scrollHeight;},300);
  }
  document.getElementById('cardGowork').addEventListener('click',function(){selectCard('gowork');});
  document.getElementById('cardGohome').addEventListener('click',function(){selectCard('gohome');});
  document.getElementById('btnCancel').addEventListener('click',function(){
    state.selected=null;document.getElementById('timepicker').classList.remove('open');
    ['cardGowork','cardGohome'].forEach(function(id){var c=document.getElementById(id);c.classList.remove('selected');c.querySelector('[data-slot]').textContent='';});
    document.getElementById('btnSubmit').classList.remove('active');
  });
  setIdx(wA,0);setIdx(wH,8);setIdx(wM,0);

  var dim=document.getElementById('dim'),screen=document.getElementById('screen'),iphone=document.getElementById('iphone'),rtHome=document.getElementById('rtGohome');
  var swSmall=document.getElementById('swSmall'),swMiss=document.getElementById('swMiss'),swGps=document.getElementById('swGps'),swNext=document.getElementById('swNext');
  function setMiss(on){swMiss.classList.toggle('on',on);if(on){rtHome.textContent='퇴근누락';rtHome.classList.add('miss');}else{rtHome.textContent='18:00';rtHome.classList.remove('miss');}}
  function setGps(on){swGps.classList.toggle('on',on);dim.classList.toggle('show-gps',on);}
  function setNext(on){swNext.classList.toggle('on',on);dim.classList.toggle('show-next',on);}
  swSmall.addEventListener('click',function(){var on=this.classList.toggle('on');screen.classList.toggle('small',on);iphone.classList.toggle('small',on);});
  swMiss.addEventListener('click',function(){var on=!swMiss.classList.contains('on');setMiss(on);if(on){setGps(false);setNext(false);}});
  swGps.addEventListener('click',function(){var on=!swGps.classList.contains('on');setGps(on);if(on)setMiss(false);});
  swNext.addEventListener('click',function(){var on=!swNext.classList.contains('on');setNext(on);if(on)setMiss(false);});
})();
</script>
</body>
</html>
